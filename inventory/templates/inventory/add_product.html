{% extends 'inventory/base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card">
      <div class="card-header py-3" style="background:#1a3a6b; color:#fff;">
        <i class="fas fa-plus-circle me-2"></i>Add New Product
      </div>
      <div class="card-body p-4">
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-bold">Product Name</label>
            <input type="text" name="product_name" class="form-control" placeholder="e.g. Latex Examination Gloves" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Category</label>
            <select name="category" class="form-select" required>
              <option value="">-- Select Category --</option>
              <option value="Latex">Latex Examination Gloves</option>
              <option value="Nitrile">Nitrile Examination Gloves</option>
              <option value="Cleanroom">Cleanroom Gloves</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label fw-bold">Current Quantity</label>
              <input type="number" name="current_quantity" class="form-control" min="0" required>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-bold">Minimum Threshold</label>
              <input type="number" name="min_threshold" class="form-control" min="1" required>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-bold">Unit</label>
            <input type="text" name="unit" class="form-control" value="boxes">
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary px-4">
              <i class="fas fa-save me-2"></i>Save Product
            </button>
            <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary px-4">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
